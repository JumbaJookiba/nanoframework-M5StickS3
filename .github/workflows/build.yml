name: Build M5StickS3 Firmware

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      release:
        description: 'Create a release'
        required: false
        default: 'false'

env:
  ESP_IDF_VERSION: v5.5.4
  IDF_PATH: /home/runner/.espressif/frameworks/esp-idf-v5.5.4
  NF_INTERPRETER_REF: v1.9.0

jobs:
  build:
    name: Build nanoFramework firmware for M5StickS3
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clone nf-interpreter
        uses: actions/checkout@v4
        with:
          repository: nanoframework/nf-interpreter
          path: nf-interpreter
          fetch-depth: 1
          ref: ${{ env.NF_INTERPRETER_REF }}

      - name: Copy M5StickS3 target files into nf-interpreter
        run: |
          # Copy target directory
          cp -r targets/ESP32/M5StickS3 nf-interpreter/targets/ESP32/M5StickS3

          # Copy defconfig
          cp targets/ESP32/defconfig/M5StickS3_defconfig \
             nf-interpreter/targets/ESP32/defconfig/M5StickS3_defconfig

          # Copy custom sdkconfig
          cp targets/ESP32/_IDF/sdkconfig.default_octal.esp32s3 \
             nf-interpreter/targets/ESP32/_IDF/sdkconfig.default_octal.esp32s3

          # Copy 8MB partition table (only if not already present)
          if [ ! -f nf-interpreter/targets/ESP32/_IDF/esp32s3/partitions_nanoclr_8mb.csv ]; then
            cp targets/ESP32/_IDF/esp32s3/partitions_nanoclr_8mb.csv \
               nf-interpreter/targets/ESP32/_IDF/esp32s3/partitions_nanoclr_8mb.csv
          fi

      - name: Add M5StickS3 preset to CMakePresets.json
        run: |
          python3 << 'EOF'
          import json

          presets_file = "nf-interpreter/targets/ESP32/CMakePresets.json"
          with open(presets_file, "r") as f:
              data = json.load(f)

          # Check if M5StickS3 preset already exists
          existing = [p for p in data.get("configurePresets", []) if p.get("name") == "M5StickS3"]
          if existing:
              print("M5StickS3 preset already exists, skipping.")
          else:
              m5sticks3_preset = {
                  "name": "M5StickS3",
                  "inherits": [
                      "xtensa-esp32s3-preset",
                      "user-tools-repos",
                      "user-prefs"
                  ],
                  "hidden": False,
                  "cacheVariables": {
                      "TARGET_NAME": "${presetName}",
                      "NF_TARGET_DEFCONFIG": "targets/ESP32/defconfig/M5StickS3_defconfig"
                  }
              }
              data["configurePresets"].append(m5sticks3_preset)
              with open(presets_file, "w") as f:
                  json.dump(data, f, indent=2)
              print("Added M5StickS3 preset to CMakePresets.json")
          EOF

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ESP-IDF prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git wget flex bison gperf python3 python3-pip python3-venv \
            cmake ninja-build ccache libffi-dev libssl-dev dfu-util \
            libusb-1.0-0

      - name: Cache ESP-IDF
        id: cache-idf
        uses: actions/cache@v4
        with:
          path: |
            ~/.espressif
            nf-interpreter/build/_deps/esp32_idf-src
          key: esp-idf-${{ env.ESP_IDF_VERSION }}

      - name: Ensure ESP-IDF is present and installed
        run: |
          if [ ! -d "$IDF_PATH" ]; then
            mkdir -p "$(dirname "$IDF_PATH")"
            git clone --recursive --depth 1 --branch "$ESP_IDF_VERSION" https://github.com/espressif/esp-idf.git "$IDF_PATH"
          fi
          "$IDF_PATH/install.sh" esp32s3

      - name: Diagnostics
        working-directory: nf-interpreter
        run: |
          python3 --version
          cmake --version
          ls -la $IDF_PATH/tools || true
          sed -n '1,50p' targets/ESP32/defconfig/M5StickS3_defconfig

      - name: Configure M5StickS3 build
        working-directory: nf-interpreter
        run: |
          source $IDF_PATH/export.sh
          cmake --preset M5StickS3 \
            -DTOOLCHAIN_PREFIX=$HOME/.espressif/tools/xtensa-esp-elf/esp-13.2.0_20240530/xtensa-esp-elf \
            -DESP32_IDF_PATH=$IDF_PATH

      - name: Build M5StickS3 firmware
        working-directory: nf-interpreter
        run: |
          source $IDF_PATH/export.sh
          cmake --build --preset M5StickS3 --target all

      - name: Prepare firmware package for nanoff
        run: |
          # Create firmware package directory
          mkdir -p firmware-package
          
          # Copy required binaries with proper naming
          cp nf-interpreter/build/M5StickS3/bootloader/bootloader.bin firmware-package/
          cp nf-interpreter/build/M5StickS3/partition_table/partition-table.bin firmware-package/
          cp nf-interpreter/build/M5StickS3/nanoCLR.bin firmware-package/
          
          # Create flash instructions file for nanoff
          cat > firmware-package/flash_instructions.txt << 'EOL'
          M5StickS3 nanoFramework Firmware Flash Instructions
          ====================================================
          
          Flash using nanoff:
          -------------------
          nanoff --target M5StickS3 --serialport COMx --update --binfile nanoCLR.bin
          
          Manual Flash using esptool (if needed):
          ---------------------------------------
          esptool.py --chip esp32s3 --port COMx --baud 921600 write_flash -z \
            0x0 bootloader.bin \
            0x8000 partition-table.bin \
            0x10000 nanoCLR.bin
          
          Flash Addresses:
          ---------------
          0x0      - bootloader.bin
          0x8000   - partition-table.bin
          0x10000  - nanoCLR.bin
          EOL
          
          # Create a README for the firmware package
          cat > firmware-package/README.md << 'EOL'
          # M5StickS3 nanoFramework Firmware
          
          This package contains the nanoFramework firmware binaries for the M5StickS3 device.
          
          ## Contents
          
          - `bootloader.bin` - ESP32-S3 bootloader (flash at 0x0)
          - `partition-table.bin` - Flash partition table (flash at 0x8000)
          - `nanoCLR.bin` - nanoFramework CLR runtime (flash at 0x10000)
          
          ## Installation using nanoff
          
          1. Install nanoff tool:
             ```
             dotnet tool install -g nanoff
             ```
          
          2. Connect your M5StickS3 via USB
          
          3. Flash the firmware:
             ```
             nanoff --target M5StickS3 --serialport COMx --update --binfile nanoCLR.bin
             ```
             
             Replace `COMx` with your device's COM port (Windows) or `/dev/ttyUSBx` (Linux/Mac)
          
          ## Manual Installation using esptool
          
          If nanoff doesn't recognize M5StickS3, use esptool directly:
          
          1. Install esptool:
             ```
             pip install esptool
             ```
          
          2. Flash all binaries:
             ```
             esptool.py --chip esp32s3 --port COMx --baud 921600 write_flash -z \
               0x0 bootloader.bin \
               0x8000 partition-table.bin \
               0x10000 nanoCLR.bin
             ```
          
          ## Device Specifications
          
          - **MCU**: ESP32-S3-PICO-1-N8R8 (8MB Flash, 8MB PSRAM)
          - **PSRAM**: OPI PSRAM enabled
          - **Display**: ST7789P3 (80x160 LCD)
          - **USB**: Native USB CDC support
          - **WiFi**: 802.11 b/g/n
          
          ## Verification
          
          After flashing, the device should:
          1. Show nanoFramework boot messages on serial console (115200 baud)
          2. Be discoverable by Visual Studio with nanoFramework extension
          3. Accept C# application deployments
          
          ## Support
          
          For issues, visit: https://github.com/JumbaJookiba/nanoframework-M5StickS3/issues
          EOL
          
          # Create version info file
          echo "Build Date: $(date -u +%Y-%m-%d_%H:%M:%S_UTC)" > firmware-package/VERSION.txt
          echo "Git Commit: ${{ github.sha }}" >> firmware-package/VERSION.txt
          echo "Git Branch: ${{ github.ref_name }}" >> firmware-package/VERSION.txt
          
          # Create ZIP package for easy distribution
          cd firmware-package
          zip -r ../M5StickS3-firmware-package.zip .
          cd ..
          
          # List contents for verification
          echo "=== Firmware Package Contents ==="
          ls -lh firmware-package/
          echo "=== Package ZIP Created ==="
          ls -lh M5StickS3-firmware-package.zip

      - name: Upload firmware binaries (individual files)
        uses: actions/upload-artifact@v4
        with:
          name: M5StickS3-firmware-binaries
          path: firmware-package/
          retention-days: 90

      - name: Upload firmware package (ZIP)
        uses: actions/upload-artifact@v4
        with:
          name: M5StickS3-firmware-package
          path: M5StickS3-firmware-package.zip
          retention-days: 90

      - name: Create Release
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.release == 'true'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.run_number }}
          name: M5StickS3 Firmware v${{ github.run_number }}
          body: |
            ## M5StickS3 nanoFramework Firmware Release
            
            ### Installation
            
            **Using nanoff (recommended):**
            ```bash
            dotnet tool install -g nanoff
            nanoff --target M5StickS3 --serialport COMx --update --binfile nanoCLR.bin
            ```
            
            **Using esptool (manual):**
            ```bash
            pip install esptool
            esptool.py --chip esp32s3 --port COMx --baud 921600 write_flash -z \
              0x0 bootloader.bin \
              0x8000 partition-table.bin \
              0x10000 nanoCLR.bin
            ```
            
            ### What's Included
            - ✅ ESP32-S3 Bootloader
            - ✅ Partition Table (8MB configuration)
            - ✅ nanoFramework CLR Runtime
            - ✅ ST7789P3 Display Driver
            - ✅ USB CDC Support
            - ✅ WiFi Support
            - ✅ OPI PSRAM Support (8MB)
            
            ### Build Information
            - **Build Date**: ${{ github.event.head_commit.timestamp }}
            - **Commit**: ${{ github.sha }}
            - **Branch**: ${{ github.ref_name }}
            
            Download the complete firmware package below.
          files: |
            M5StickS3-firmware-package.zip
            firmware-package/bootloader.bin
            firmware-package/partition-table.bin
            firmware-package/nanoCLR.bin
            firmware-package/README.md
            firmware-package/flash_instructions.txt
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  validate-config:
    name: Validate M5StickS3 configuration files
    runs-on: ubuntu-24.04
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate defconfig file
        run: |
          echo "Validating M5StickS3 defconfig..."
          grep -q "CONFIG_API_SYSTEM_DEVICE_SPI=y" targets/ESP32/defconfig/M5StickS3_defconfig
          grep -q "CONFIG_API_SYSTEM_DEVICE_I2C=y" targets/ESP32/defconfig/M5StickS3_defconfig
          grep -q "CONFIG_API_SYSTEM_DEVICE_GPIO=y" targets/ESP32/defconfig/M5StickS3_defconfig
          grep -q "CONFIG_ESP32_USB_CDC=y" targets/ESP32/defconfig/M5StickS3_defconfig
          grep -q "CONFIG_GRAPHICS_DISPLAY_ST7789P3=y" targets/ESP32/defconfig/M5StickS3_defconfig
          grep -q "CONFIG_TARGET_SERIES=\"ESP32_S3\"" targets/ESP32/defconfig/M5StickS3_defconfig
          echo "✅ defconfig validation passed!"

      - name: Validate sdkconfig
        run: |
          echo "Validating sdkconfig..."
          grep -q "CONFIG_IDF_TARGET=\"esp32s3\"" targets/ESP32/_IDF/sdkconfig.default_octal.esp32s3
          grep -q "CONFIG_SPIRAM_MODE_OCT=y" targets/ESP32/_IDF/sdkconfig.default_octal.esp32s3
          grep -q "CONFIG_ESPTOOLPY_FLASHSIZE_8MB=y" targets/ESP32/_IDF/sdkconfig.default_octal.esp32s3
          grep -q "partitions_nanoclr_8mb.csv" targets/ESP32/_IDF/sdkconfig.default_octal.esp32s3
          echo "✅ sdkconfig validation passed!"

      - name: Validate partition table
        run: |
          echo "Validating partition table..."
          grep -q "factory" targets/ESP32/_IDF/esp32s3/partitions_nanoclr_8mb.csv
          grep -q "deploy" targets/ESP32/_IDF/esp32s3/partitions_nanoclr_8mb.csv
          grep -q "config" targets/ESP32/_IDF/esp32s3/partitions_nanoclr_8mb.csv
          echo "✅ Partition table validation passed!"

      - name: Validate target files exist
        run: |
          echo "Validating target files..."
          required_files=(
            "targets/ESP32/M5StickS3/CMakeLists.txt"
            "targets/ESP32/M5StickS3/target_common.h.in"
            "targets/ESP32/M5StickS3/target_common.c"
            "targets/ESP32/M5StickS3/target_BlockStorage.c"
            "targets/ESP32/M5StickS3/target_BlockStorage.h"
            "targets/ESP32/M5StickS3/target_FileSystem.cpp"
            "targets/ESP32/M5StickS3/nanoCLR/target_board.h.in"
            "targets/ESP32/M5StickS3/nanoCLR/nanoHAL.cpp"
            "targets/ESP32/M5StickS3/nanoCLR/nanoFramework.Graphics/Graphics_Memory.cpp"
            "targets/ESP32/M5StickS3/nanoCLR/nanoFramework.Graphics/Spi_To_TouchPanel.cpp"
          )
          for f in "${required_files[@]}"; do
            if [ ! -f "$f" ]; then
              echo "❌ MISSING: $f"
              exit 1
            fi
            echo "✅ OK: $f"
          done
          echo "✅ All target files present!"
